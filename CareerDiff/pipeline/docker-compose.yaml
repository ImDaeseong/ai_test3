# Minimal local Airflow setup for the CareerDiff learning pipeline.
# Not tuned for production (single webserver/scheduler container, LocalExecutor).
#
# Usage:
#   cd pipeline
#   docker compose up -d
#   open http://localhost:8080  (user: airflow / pass: airflow, seeded by airflow-init)
#   trigger the "career_pipeline_dag" DAG from the UI or:
#   docker compose exec airflow airflow dags trigger career_pipeline_dag
#   docker compose down

x-airflow-common: &airflow-common
  image: apache/airflow:2.10.5-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
    EMBEDDING_PROVIDER: local
  volumes:
    - ./dags:/opt/airflow/dags
    - ./tasks:/opt/airflow/tasks
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - >
        airflow db migrate &&
        airflow users create
          --username airflow --password airflow
          --firstname Career --lastname Diff
          --role Admin --email admin@example.com

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init

volumes:
  postgres-db-volume:
